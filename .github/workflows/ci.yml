name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: backend/requirements.txt
      - name: Install dependencies
        run: python -m pip install --upgrade pip && python -m pip install -r requirements.txt
      - name: Compile application
        run: python -m compileall app
      - name: Run tests
        run: pytest -q

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: 前端
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11.11.0
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: pnpm
          cache-dependency-path: 前端/pnpm-lock.yaml
      - name: Show runtime versions
        run: |
          node --version
          pnpm --version
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: TypeScript check
        run: pnpm exec tsc -b
      - name: Lint
        run: pnpm lint
      - name: Build
        run: pnpm build
